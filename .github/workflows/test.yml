name: test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4.8.0
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
      - name: Generate DSL
        uses: burrunan/gradle-cache-action@v3.0.2
        with:
          arguments: :dsl-generator:run
      - name: Test
        uses: burrunan/gradle-cache-action@v3.0.2
        with:
          arguments: :example:run